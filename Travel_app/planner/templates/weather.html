
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Forecast</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#eef6ff;
    font-family:'Segoe UI',sans-serif;
}

.hero{
    height:380px;

    background:
    linear-gradient(
    rgba(0,0,0,.5),
    rgba(0,0,0,.5)),
    url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;
}

.hero h1{
    font-size:3.5rem;
    font-weight:bold;
}

.weather-card{
    margin-top:-80px;
    border:none;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.search-box{
    background:#f8fafc;
    border-radius:15px;
    padding:20px;
}

.btn-weather{
    background:#0ea5e9;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px;
    font-size:18px;
    font-weight:bold;
}

.btn-weather:hover{
    background:#0284c7;
}

.result-card{
    background:linear-gradient(135deg,#38bdf8,#2563eb);
    color:white;
    border-radius:20px;
    padding:25px;
    text-align:center;
}

.temp{
    font-size:60px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="hero">

    <div>

        <a href="/" class="btn btn-light mb-3">
            ← Dashboard
        </a>

        <h1>🌦 Weather Forecast</h1>

        <p>
            Check weather conditions before your trip
        </p>

    </div>

</div>

<div class="container">

    <div class="card weather-card">

        <div class="card-body p-5">

            <div class="search-box mb-4">

                <h3 class="text-center mb-3">
                    Search City Weather
                </h3>

                <form method="POST">

                    {% csrf_token %}

                    <input
                    type="text"
                    name="city"
                    class="form-control mb-3"
                    placeholder="Enter City Name">

                    <button
                    type="submit"
                    class="btn-weather w-100">

                        Check Weather

                    </button>

                </form>

            </div>

            {% if weather %}

            <div class="result-card">

                <h2>
                    📍 {{ weather.name }}
                </h2>

                <div class="temp">
                    {{ weather.main.temp }}°C
                </div>

                <h4>
                    {{ weather.weather.0.description }}
                </h4>

            </div>

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>

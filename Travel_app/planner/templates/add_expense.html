<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Expense Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fb;
    font-family:'Segoe UI',sans-serif;
}

/* ======================
   HERO SECTION
====================== */
.hero{
    height:380px;

    background:
    linear-gradient(rgba(0,0,0,.5),
    rgba(0,0,0,.5)),
    url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;
}

.hero h1{
    font-size:3.5rem;
    font-weight:bold;
}

/* ======================
   CARD & BOX STYLING
====================== */
.expense-card{
    margin-top:-80px;
    border:none;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    background: white;
    margin-bottom: 50px;
}

.info-box{
    background:#ecfdf5;
    border-left:6px solid #10b981;
    padding:15px;
    border-radius:10px;
}

/* ======================
   FORM FIELD STYLING
====================== */
.form-label {
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
}

/* Styles both manually written inputs and the dynamically generated Django select field */
.expense-card input,
.expense-card select,
.django-select-wrapper select {
    width: 100%;
    padding: 13px 15px;
    border: 1.8px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    transition: 0.3s ease;
    background: #f8fafc;
}

.expense-card input:focus,
.expense-card select:focus,
.django-select-wrapper select:focus {
    border-color: #ef4444; /* Matches the red button theme on focus */
    box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
    outline: none;
    background: white;
}

/* ======================
   BUTTONS
====================== */
.btn-save{
    background:#ef4444;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:18px;
    font-weight:bold;
    transition: 0.3s ease;
}

.btn-save:hover{
    background:#dc2626;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);
}

</style>

</head>

<body>

<div class="hero">

    <div>

        <a href="/" class="btn btn-light mb-3">
            ← Dashboard
        </a>

        <h1>💰 Travel Expense Tracker</h1>

        <p>
            Track your trip budget and expenses easily
        </p>

    </div>

</div>

<div class="container">

    <div class="card expense-card">

        <div class="card-body p-5">

            <div class="info-box mb-4">
                <h5 style="color: #065f46; font-weight: 700;">Expense Categories</h5>
                <p class="mb-0" style="color: #047857;">
                    Hotel • Food • Transport • Shopping • Activities
                </p>
            </div>

            <h2 class="text-center mb-4" style="font-weight: 700; color: #1e293b;">
                Add Expense
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-12 mb-3">
                        <label class="form-label">Trip</label>
                        <div class="django-select-wrapper">
                            {{ form.trip }}
                        </div>
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" name="category" required placeholder="e.g., Food, Hotel, Transport">
                    </div>

                    <div class="col-12 mb-4">
                        <label class="form-label">Amount</label>
                        <input type="number" name="amount" step="0.01" required placeholder="0.00">
                    </div>

                </div>

                <button type="submit" class="btn-save w-100">
                    Save Expense
                </button>

            </form>

        </div>

    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const selectField = document.querySelector('.django-select-wrapper select');
        if (selectField) {
            selectField.setAttribute('required', 'required');
        }
    });
</script>

</body>
</html>

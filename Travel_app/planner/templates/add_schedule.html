<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Schedule Planner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f8ff;
    font-family:'Segoe UI',sans-serif;
}

/* ======================
   HERO SECTION
====================== */
.hero{
    height:380px;

    background:
    linear-gradient(
    rgba(0,0,0,.5),
    rgba(0,0,0,.5)),
    url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:white;
}

.hero h1{
    font-size:3.5rem;
    font-weight:bold;
}

/* ======================
   CARD & BOX STYLING
====================== */
.schedule-card{
    margin-top:-80px;
    border:none;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    background: white;
    margin-bottom: 50px;
}

.tip-box{
    background:#eff6ff;
    border-left:5px solid #2563eb;
    padding:15px;
    border-radius:10px;
}

.activity-card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,.08);
    font-weight: 600;
    color: #475569;
}

/* ======================
   FORM FIELD STYLING
====================== */
.form-label {
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
}

.schedule-card input,
.schedule-card select,
.django-select-wrapper select {
    width: 100%;
    padding: 13px 15px;
    border: 1.8px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    transition: 0.3s ease;
    background: #f8fafc;
}

.schedule-card input:focus,
.schedule-card select:focus,
.django-select-wrapper select:focus {
    border-color: #f59e0b; /* Matches your amber theme button */
    box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.15);
    outline: none;
    background: white;
}

/* ======================
   BUTTONS
====================== */
.btn-save{
    background:#f59e0b;
    color:white;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size:18px;
    font-weight:bold;
    transition: 0.3s ease;
}

.btn-save:hover{
    background:#d97706;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2);
}

</style>

</head>

<body>

<div class="hero">

    <div>

        <a href="/" class="btn btn-light mb-3">
            ← Dashboard
        </a>

        <h1>📅 Travel Schedule Planner</h1>

        <p>
            Organize your trip day by day
        </p>

    </div>

</div>

<div class="container">

    <div class="card schedule-card">

        <div class="card-body p-5">

            <div class="tip-box mb-4">
                <h5 style="color: #1e3a8a; font-weight: 700;">Suggested Activities</h5>
                <p class="mb-0" style="color: #2563eb;">
                    🏖 Beach Visit • 🏰 Sightseeing • 🍽 Food Tour • 🛍 Shopping • 🚗 Local Travel
                </p>
            </div>

            <div class="row mb-4">

                <div class="col-md-4 mb-2">
                    <div class="activity-card text-center">
                        🌅 Morning Plan
                    </div>
                </div>

                <div class="col-md-4 mb-2">
                    <div class="activity-card text-center">
                        ☀️ Afternoon Plan
                    </div>
                </div>

                <div class="col-md-4 mb-2">
                    <div class="activity-card text-center">
                        🌙 Evening Plan
                    </div>
                </div>

            </div>

            <h2 class="text-center mb-4" style="font-weight: 700; color: #1e293b;">
                Add Schedule
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="row">

                    <div class="col-12 mb-3">
                        <label class="form-label">Trip</label>
                        <div class="django-select-wrapper">
                            {{ form.trip }}
                        </div>
                    </div>

                    <div class="col-12 mb-3">
                        <label class="form-label">Activity</label>
                        <input type="text" name="activity" required placeholder="e.g., Visit Museum, Dinner at beach side">
                    </div>

                    <div class="col-12 mb-4">
                        <label class="form-label">Date and Time</label>
                        <input type="datetime-local" name="date_time" required>
                    </div>

                </div>

                <button type="submit" class="btn-save w-100">
                    Save Schedule
                </button>

            </form>

        </div>

    </div>

</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const selectField = document.querySelector('.django-select-wrapper select');
        if (selectField) {
            selectField.setAttribute('required', 'required');
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Trip</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#0f172a,#1e3a8a);
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
}

/* ======================
   HERO SECTION
====================== */
.hero{
    text-align:center;
    color:white;
    padding:50px 20px;
}

.hero h1{
    font-size:3rem;
    font-weight:bold;
}

/* ======================
   CARD STYLING
====================== */
.trip-card{
    border:none;
    border-radius:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    background: white;
    margin-bottom: 50px;
}

.trip-image{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:25px 25px 0 0;
}

/* ======================
   FORM DESIGN
====================== */
.form-label {
    font-weight: 600;
    color: #334155;
    margin-bottom: 8px;
}

.trip-card input,
.trip-card select {
    width: 100%;
    padding: 13px 15px;
    border: 1.8px solid #e2e8f0;
    border-radius: 12px;
    font-size: 15px;
    transition: 0.3s ease;
    background: #f8fafc;
}

.trip-card input:focus,
.trip-card select:focus {
    border-color: #0ea5e9; /* Matches the blue custom button tint on focus */
    box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
    outline: none;
    background: white;
}

/* ======================
   BUTTONS
====================== */
.btn-custom{
    background:#0ea5e9;
    color:white;
    font-weight:bold;
    border:none;
    border-radius:12px;
    padding:14px;
    font-size: 17px;
    transition: 0.3s ease;
}

.btn-custom:hover{
    background:#0284c7;
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(14, 165, 233, 0.3);
}

.back-btn{
    text-decoration:none;
    color:white;
    opacity: 0.8;
    transition: 0.3s;
}

.back-btn:hover{
    opacity: 1;
    color: white;
}

</style>

</head>

<body>

<div class="container">

    <div class="hero">

        <a href="/" class="back-btn">
            ← Back to Dashboard
        </a>

        <h1 class="mt-3">✈ Create Your Dream Trip</h1>

        <p>
            Plan destinations, expenses and schedules for your next adventure.
        </p>

    </div>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card trip-card">

                <img
                src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800"
                class="trip-image">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4" style="font-weight: 700; color: #1e293b;">
                        Add New Trip
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <div class="col-12 mb-3">
                                <label class="form-label">Trip Name</label>
                                <input type="text" name="trip_name" required placeholder="e.g., Summer Vacation 2026">
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label">Source</label>
                                <input type="text" name="source" required placeholder="Starting Location">
                            </div>

                            <div class="col-12 mb-3">
                                <label class="form-label">Destination City</label>
                                <input type="text" name="destination_city" required placeholder="Where are you heading?">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Start Date</label>
                                <input type="date" name="start_date" required>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">End Date</label>
                                <input type="date" name="end_date" required>
                            </div>

                        </div>

                        <button type="submit" class="btn btn-custom w-100">
                            Save Trip
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
